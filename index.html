<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TD7 Calculadora</title>
<style>
body{background:#071022;font-family:Arial,sans-serif;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.container{width:700px;padding:28px;border-radius:16px;background:rgba(10,15,31,0.95);box-shadow:0 0 25px #009dff}
h1{text-align:center;color:#4fc3ff;letter-spacing:2px}.item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(79,195,255,0.2)}
input{width:70px;padding:6px;border-radius:6px;border:1px solid #4fc3ff;background:#061226;color:#4fc3ff;text-align:center;font-weight:bold}
button{padding:8px 16px;border:none;border-radius:6px;margin:5px;font-weight:bold;cursor:pointer}
.parceria{background:#00c853;color:black}.normal{background:#c62828;color:white}
.resultados{display:flex;justify-content:space-between;margin-top:22px;gap:10px}.box{flex:1;padding:16px;border-radius:10px;background:#061226;border:1px solid #4fc3ff;text-align:center}.valor{font-size:24px;margin-top:8px;color:#4fc3ff}
</style>
</head>
<body>
<div class="container">
<h1>🔫 TD7 CALCULADORA</h1>
<div style="text-align:center;margin-bottom:18px;">
<button class="parceria" onclick="setModo('parceria')">COM PARCERIA</button>
<button class="normal" onclick="setModo('normal')">SEM PARCERIA</button>
</div>
<div id="lista"></div>
<div class="resultados">
<div class="box"><div>💰 TOTAL</div><div class="valor" id="total">R$ 0,00</div></div>
<div class="box"><div>👤 VENDEDOR (30%)</div><div class="valor" id="vendedor">R$ 0,00</div></div>
<div class="box"><div>🏢 EMPRESA (70%)</div><div class="valor" id="empresa">R$ 0,00</div></div>
</div>
</div>
<script>
let modo='parceria';
const itens={
  'Five':{parceria:526.50,normal:531.81},
  'MTAR':{parceria:702.00,normal:780.00},
  'AKS':{parceria:661.50,normal:735.00},
  'Uzi':{parceria:560.25,normal:622.50},
  'Metafetamina':{parceria:600.00,normal:700.00}
};
const lista=document.getElementById('lista');
function formatar(valor){return valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function gerarId(nome){return nome.replace(/\s+/g,'_');}
function criarLista(){
  lista.innerHTML='';
  for(let nome in itens){
    let div=document.createElement('div');
    div.className='item';
    div.innerHTML=`<div><div>🔸 ${nome}</div><div style="font-size:13px;opacity:.7">💵 ${formatar(itens[nome][modo])} unitário</div></div><input type="number" min="0" value="0" id="q_${gerarId(nome)}">`;
    lista.appendChild(div);
  }
}
function setModo(n){modo=n;criarLista();calcular();}
document.addEventListener('input',calcular);
function calcular(){
  let total=0;
  for(let nome in itens){
    let qtd=document.getElementById('q_'+gerarId(nome));
    if(qtd){total += Number(qtd.value||0)*itens[nome][modo];}
  }
  document.getElementById('total').innerText=formatar(total);
  document.getElementById('vendedor').innerText=formatar(total*0.30);
  document.getElementById('empresa').innerText=formatar(total*0.70);
}
criarLista();
</script>
</body>
</html>
