<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TD7 Calculadora</title>

<style>

body{
background:#050914;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
overflow:hidden;
}

.container{
width:850px;
padding:40px;
border-radius:18px;
background:#0a0f1f;

box-shadow:
0 0 25px #009dff,
0 0 45px rgba(0,140,255,0.5),
inset 0 0 12px rgba(0,140,255,0.3);
}

h1{
text-align:center;
color:#4fc3ff;
letter-spacing:4px;
margin-bottom:25px;
font-size:36px;

text-shadow:0 0 15px #4fc3ff;
}

.status{
text-align:center;
padding:12px;
border-radius:8px;
border:1px solid #4fc3ff;
background:#071022;
margin-bottom:25px;
font-size:18px;

box-shadow:0 0 12px rgba(79,195,255,0.4);
}

.dot{
font-size:22px;
margin-right:6px;
}

.botoes{
text-align:center;
margin-bottom:25px;
}

button{
padding:12px 22px;
border:none;
border-radius:6px;
margin:6px;
font-weight:bold;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

.parceria{
background:#00c853;
color:black;
box-shadow:0 0 12px #00ff7b;
}

.normal{
background:#c62828;
color:white;
box-shadow:0 0 12px #ff4d4d;
}

button:hover{
transform:scale(1.07);
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 0;
border-bottom:1px solid rgba(79,195,255,0.2);
}

.nome{
font-size:20px;
}

.preco{
font-size:15px;
opacity:0.7;
}

input{
width:80px;
padding:8px;
border-radius:6px;
border:1px solid #4fc3ff;
background:#061226;
color:#4fc3ff;
text-align:center;
font-weight:bold;
font-size:18px;

box-shadow:0 0 6px rgba(79,195,255,0.5);
}

.resultados{
display:flex;
justify-content:space-between;
margin-top:35px;
}

.box{
width:32%;
padding:22px;
border-radius:10px;
background:#061226;
border:1px solid #4fc3ff;
text-align:center;

box-shadow:0 0 12px rgba(79,195,255,0.3);
}

.box div:first-child{
font-size:18px;
}

.valor{
font-size:30px;
margin-top:12px;
color:#4fc3ff;

text-shadow:0 0 12px #4fc3ff;
}

</style>
</head>

<body>

<div class="container">

<h1>🔫 TD7 MUNIÇÃO</h1>

<div class="status" id="status">
<span class="dot">🟢</span>
MODO PARCERIA ATIVO
</div>

<div class="botoes">
<button class="parceria" onclick="setModo('parceria')">COM PARCERIA</button>
<button class="normal" onclick="setModo('normal')">SEM PARCERIA</button>
</div>

<div id="lista"></div>

<div class="resultados">

<div class="box">
<div>💰 TOTAL BRUTO</div>
<div class="valor" id="total">R$ 0,00</div>
</div>

<div class="box">
<div>👤 VENDEDOR (30%)</div>
<div class="valor" id="vendedor">R$ 0,00</div>
</div>

<div class="box">
<div>🏢 EMPRESA (70%)</div>
<div class="valor" id="empresa">R$ 0,00</div>
</div>

</div>

</div>

<script>

let modo="parceria"

const itens={
"Five-Seven":{normal:303,parceria:273},
"Tec-9":{normal:296,parceria:266},
"AKS":{normal:341,parceria:307},
"AK-47":{normal:363,parceria:327},
"G3":{normal:450,parceria:405},
"LSD":{normal:350,parceria:300}
}

const lista=document.getElementById("lista")

function formatar(valor){
return valor.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})
}

function criarLista(){

lista.innerHTML=""

for(let nome in itens){

let div=document.createElement("div")
div.className="item"

div.innerHTML=`
<div>
<div class="nome">🔸 ${nome}</div>
<div class="preco">💵 ${formatar(itens[nome][modo])} unitário</div>
</div>

<input type="number" min="0" value="0" id="q_${nome}">
`

lista.appendChild(div)

}

}

function setModo(n){

modo=n

if(n=="parceria"){
document.getElementById("status").innerHTML="<span class='dot'>🟢</span> MODO PARCERIA ATIVO"
}else{
document.getElementById("status").innerHTML="<span class='dot'>🔴</span> MODO SEM PARCERIA"
}

criarLista()
calcular()

}

document.addEventListener("input",calcular)

function calcular(){

let total=0

for(let nome in itens){

let qtd=document.getElementById("q_"+nome)

if(qtd){

let preco=itens[nome][modo]
total+=qtd.value*preco

}

}

document.getElementById("total").innerText=formatar(total)
document.getElementById("vendedor").innerText=formatar(total*0.30)
document.getElementById("empresa").innerText=formatar(total*0.70)

}

criarLista()

</script>

</body>
</html>
